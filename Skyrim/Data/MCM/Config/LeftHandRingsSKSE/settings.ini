[General]
; Extra ring mode.
; Functional applies normal ring enchantments and scripts. Cosmetic only shows the ring model.
; Applies only to extra rings. The vanilla right-hand index finger ring is unaffected.
; 0 = Functional, 1 = Cosmetic.
; Default: 0
iExtraRingMode = 0

; Ring enchantment strength mode.
; Full keeps normal strength. Fixed uses the chosen strength. Split divides 100% evenly between equipped enchanted rings.
; Applies to all equipped enchanted rings, including the vanilla right-hand index finger, when more than one enchanted ring is equipped.
; 0 = Full strength, 1 = Fixed strength, 2 = Split strength.
; Default: 0
iEnchantmentStrengthMode = 0

; Fixed ring enchantment strength.
; Applies only when enchantment strength mode is Fixed strength and more than one enchanted ring is equipped.
; Each enchanted ring uses this strength, including the vanilla right-hand index finger.
; Valid range: 5-100.
; Default: 50
iFixedEnchantmentStrengthPercent = 50

; Always show the finger selection menu whenever you use Equip or Left Equip on a ring without pressing a modifier key.
; Default: false
bAlwaysChooseFinger = false

; Finger selection modifier for keyboard and mouse input.
; Default: 42
iFingerSelectModifierKey = 42

; Finger selection modifier for controller input.
; Default: 274
iFingerSelectModifierButton = 274
