[General]
; Equipment slot used to display regular left-hand rings.
; You can enter the full label or just the slot number, such as 58.
; Default: Arm Left / Secondary Arm (58)
sBipedSlot=Arm Left / Secondary Arm (58)

; Give The Bond of Matrimony its own left-hand ring slot.
; Default: true
bEnableBondOfMatrimony=true

; Equipment slot used to display The Bond of Matrimony on the left hand.
; You can enter the full label or just the slot number, such as 59.
; Default: Arm Right / Primary Arm (59)
sBondBipedSlot=Arm Right / Primary Arm (59)

; Left-hand ring enchantment strength while an enchanted right-hand ring is equipped.
; Valid range: 5-100.
; Default: 100
iLeftRingEnchantmentPowerPercent=100
