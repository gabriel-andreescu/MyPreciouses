[General]
; Enable debug logging.
; Default: false
bEnableDebugLogging = false

; Extra ring mode.
; Functional applies normal ring enchantments and scripts. Cosmetic only shows the ring model.
; Applies only to extra rings. The vanilla right-hand index finger ring is unaffected.
; 0 = Functional, 1 = Cosmetic.
; Default: 0
iExtraRingMode = 0

; Ring enchantment strength mode.
; Full keeps normal strength. Fixed uses the chosen strength. Split divides 100% evenly between counted rings.
; Only equipped rings with at least one non-zero-magnitude enchantment effect are counted, including the vanilla right-hand index finger.
; 0 = Full strength, 1 = Fixed strength, 2 = Split strength.
; Default: 0
iEnchantmentStrengthMode = 0

; Fixed ring enchantment strength.
; Used by Fixed strength mode. Only equipped rings with at least one non-zero-magnitude enchantment effect are counted, including the vanilla right-hand index finger.
; Valid range: 5-100.
; Default: 50
iFixedEnchantmentStrengthPercent = 50

; Always show the finger selection menu whenever you use Equip or Left Equip on a ring without pressing a modifier key.
; Default: false
bAlwaysChooseFinger = false

; Finger selection modifier for keyboard and mouse input.
; Default: 42
iFingerSelectModifierKey = 42

; Finger selection modifier for controller input.
; Vanilla UI inventory hints only support RB. The finger selector still works, but the inventory hint will not be shown for other controller buttons.
; Default: 275
iFingerSelectModifierButton = 275

[VirtualSlots]
; Enable the left thumb virtual ring slot.
; Default: true
bEnableLeftThumb = true

; Enable the left index virtual ring slot.
; Default: true
bEnableLeftIndex = true

; Enable the left middle virtual ring slot.
; Default: true
bEnableLeftMiddle = true

; Enable the left ring virtual ring slot.
; Default: true
bEnableLeftRing = true

; Enable the left pinky virtual ring slot.
; Default: true
bEnableLeftPinky = true

; Enable the right thumb virtual ring slot.
; Default: true
bEnableRightThumb = true

; Enable the right middle virtual ring slot.
; Default: true
bEnableRightMiddle = true

; Enable the right ring virtual ring slot.
; Default: true
bEnableRightRing = true

; Enable the right pinky virtual ring slot.
; Default: true
bEnableRightPinky = true
